typeDescription:
  # Map of
  # type: Description to be shown on the top of list view describing the type.
  #       Should fit on one line.
  #       If you link to anything external, it MUST have
  #       target="_blank" rel="noopener noreferrer nofollow"
  jwt.authentication: Habilite esta funcionalidade em um cluster para adicionar suporte à autenticação JWT de contas de serviço secundárias.
  branding: A personalização de marca permite que os administradores redefinam globalmente a interface do usuário, personalizando o nome do produto Rancher, logotipos e esquema de cores.
  chart: Todos os charts têm pelo menos uma versão que pode ser instalada em clusters com nós Linux e Windows, salvo indicação em contrário.
  compliance.cattle.io.clusterscanbenchmark: Uma versão de benchmark é o nome do benchmark a ser executado usando o kube-bench, bem como os parâmetros de configuração válidos para o escaneamento.
  compliance.cattle.io.clusterscanprofile: Um perfil é a configuração para a verificação de conformidade, que define as versões de benchmark a serem usadas e quaisquer testes específicos a ignorar.
  compliance.cattle.io.clusterscan: Uma varredura é criada para acionar uma verificação de conformidade no cluster com base no perfil definido. Um relatório é criado após a varredura.
  compliance.cattle.io.clusterscanreport: Um relatório é o resultado de uma verificação de conformidade do cluster.
  management.cattle.io.feature: Os Feature Flags permitem que determinados recursos do {vendor} sejam ativados ou desativados. Recursos desativados por padrão devem ser considerados experimentais.
  cluster.x-k8s.io.machine: Uma Máquina encapsula a configuração de um Nó Kubernetes. Use esta visualização para ver o que acontece após atualizar um cluster.
  cluster.x-k8s.io.machinedeployment: Um Machine Deployment orquestra implantações via templates em uma coleção de Machine Sets (semelhante a um Deployment).
  cluster.x-k8s.io.machineset: Um Machine Set garante que o número desejado de recursos de Máquina estejam em execução a todo momento (semelhante a um ReplicaSet).
  resources.cattle.io.backup: Um backup é criado para realizar backups únicos ou agendar backups recorrentes com base em um ResourceSet.
  resources.cattle.io.restore: Uma restauração é criada para acionar uma restauração no cluster com base em um arquivo de backup.
  resources.cattle.io.resourceset: Um conjunto de recursos define quais CRDs e recursos armazenar no backup.
  monitoring.coreos.com.servicemonitor: Um monitor de serviço define o grupo de serviços e endpoints que o Prometheus irá coletar métricas. Esta é a maneira recomendada de configurar o Prometheus.
  monitoring.coreos.com.podmonitor: Um monitor de pod define o grupo de pods que o Prometheus irá coletar métricas. A maneira comum é usar monitores de serviço, mas para casos especiais monitores de pod são úteis.
  monitoring.coreos.com.prometheusrule: Um recurso de Regra Prometheus define regras de gravação e/ou alerta. Uma regra de gravação pode pré-computar valores e salvá-los como novas séries temporais.
  monitoring.coreos.com.prometheus: Um servidor Prometheus é uma implantação Prometheus cuja configuração de coleta e regras são determinadas pelos ServiceMonitors e PodMonitors selecionados.
  monitoring.coreos.com.alertmanager: Um gerenciador de alertas é uma implantação cuja configuração será especificada por um segredo no mesmo namespace, que determina como os alertas são roteados.
  node: O recurso base Kubernetes Node representa uma máquina virtual ou física que hospeda deployments. Para gerenciar a máquina, use o recurso Machine correspondente.
  catalog.cattle.io.clusterrepo: Um repositório de charts é um repositório Helm ou catálogo de aplicativos baseado em git do {vendor}. Fornece a lista de charts disponíveis para instalar.
  catalog.cattle.io.clusterrepo.local:  Um repositório de charts é um repositório Helm ou catálogo de aplicativos baseado em git do {vendor}. Fornece a lista de charts disponíveis para instalar.
  catalog.cattle.io.operation: Uma operação é a lista de operações Helm recentes aplicadas ao cluster.
  catalog.cattle.io.app: Um aplicativo instalado é um chart Helm 3 que foi instalado via nossos charts ou através do Helm CLI.
  logging.banzaicloud.io.clusterflow: Os logs do cluster serão coletados e registrados na Saída de Cluster selecionada.
  logging.banzaicloud.io.clusteroutput: Uma saída de cluster define quais provedores de logging podem receber logs e só é efetiva quando implantada no namespace de logging.
  logging.banzaicloud.io.flow: Um fluxo define quais logs coletar e filtrar, bem como qual saída enviar os logs. O fluxo é um recurso com escopo de namespace.
  logging.banzaicloud.io.output: Uma saída define quais provedores de logging podem receber logs. A saída precisa estar no mesmo namespace que o fluxo.
  group.principal: Atribuir funções globais a um grupo só funciona com provedores de autenticação externos que suportam grupos. A autorização local não suporta grupos.
  management.cattle.io.oidcclient: Aqui você pode adicionar aplicativos ao provedor de identidade de logon único do Rancher
  auditlog.cattle.io.auditpolicy: Defina regras que determinam quais eventos da API Rancher são registrados e o nível de detalhe que eles contêm.

