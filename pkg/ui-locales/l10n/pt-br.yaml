      label: Timeout do Cliente Git
      description: "O tempo a aguardar por uma resposta do servidor antes de cancelar a solicitação. Usado para recuperar o commit mais recente dos repositórios git configurados. Um valor inexistente ou 0 resultará em um timeout de 30 segundos."
