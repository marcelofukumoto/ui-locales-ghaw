typeDescription:
  # Map of
  # type: Description to be shown on the top of list view describing the type.
  #       Should fit on one line.
  #       If you link to anything external, it MUST have
  #       target="_blank" rel="noopener noreferrer nofollow"
  jwt.authentication: Ative este recurso em um cluster para adicionar suporte à autenticação JWT para contas de serviço downstream.
  branding: "O Branding permite que administradores personalizem globalmente a interface, incluindo o nome do produto Rancher, logotipos e esquema de cores."
  chart: "Todos os charts possuem pelo menos uma versão instalável em clusters com nodes Linux e Windows, salvo indicação em contrário."
  compliance.cattle.io.clusterscanbenchmark: Uma versão de benchmark é o nome do benchmark a ser executado com o kube-bench, bem como os parâmetros de configuração válidos para esse benchmark.
  compliance.cattle.io.clusterscanprofile: Um perfil é a configuração para a verificação de conformidade, que inclui as versões de benchmark a serem usadas e os testes específicos a serem ignorados nesse benchmark.
  compliance.cattle.io.clusterscan: Uma verificação é criada para acionar uma verificação de conformidade no cluster com base no perfil definido. Um relatório é criado após a conclusão da verificação.
  compliance.cattle.io.clusterscanreport: Um relatório é o resultado de uma verificação de conformidade do cluster.
  management.cattle.io.feature: Os Feature Flags permitem que determinados recursos do {vendor} sejam ativados e desativados. Os recursos desativados por padrão devem ser considerados funcionalidades experimentais.
  cluster.x-k8s.io.machine: Uma Machine encapsula a configuração de um Node Kubernetes. Use esta visualização para ver o que acontece após atualizar um cluster.
  cluster.x-k8s.io.machinedeployment: Um Machine Deployment orquestra deployments via templates em uma coleção de Machine Sets (semelhante a um Deployment). Use esta visualização para ver o que acontece após atualizar um cluster.
  cluster.x-k8s.io.machineset: Um Machine Set garante que o número desejado de recursos Machine esteja em execução a todo momento (semelhante a um ReplicaSet). Use esta visualização para ver o que acontece após atualizar um cluster.
  resources.cattle.io.backup: Um backup é criado para realizar backups únicos ou agendar backups recorrentes com base em um ResourceSet.
  resources.cattle.io.restore: Uma restauração é criada para acionar uma restauração no cluster com base em um arquivo de backup.
  resources.cattle.io.resourceset: Um resource set define quais CRDs e recursos serão armazenados no backup.
  monitoring.coreos.com.servicemonitor: Um service monitor define o grupo de serviços e os endpoints que o Prometheus irá coletar para métricas. Esta é a forma mais comum de definir a coleta de métricas.
  monitoring.coreos.com.podmonitor: Um pod monitor define o grupo de pods que o Prometheus irá coletar para métricas. A forma comum é usar service monitors, mas os pod monitors permitem lidar com situações em que um service monitor não funcionaria.
  monitoring.coreos.com.prometheusrule: Um recurso Prometheus Rule define regras de gravação e/ou alerta. Uma regra de gravação pode pré-computar valores e salvar os resultados. As regras de alerta permitem definir condições para enviar notificações ao AlertManager.
  monitoring.coreos.com.prometheus: Um servidor Prometheus é um deployment cujas configurações de coleta e regras são determinadas pelos ServiceMonitors, PodMonitors e PrometheusRules selecionados, e cujos alertas serão enviados para todos os Alertmanagers selecionados com a configuração do recurso personalizado.
  monitoring.coreos.com.alertmanager: Um alert manager é um deployment cuja configuração será especificada por um secret no mesmo namespace, determinando quais alertas devem ser enviados para qual receptor.
  node: O recurso base de Node Kubernetes representa uma máquina virtual ou física que hospeda deployments. Para gerenciar o ciclo de vida da máquina, se disponível, acesse o Gerenciamento de Cluster.
  catalog.cattle.io.clusterrepo: 'Um repositório de charts é um repositório Helm ou catálogo de aplicativos baseado em git do {vendor}. Fornece a lista de charts disponíveis no cluster.'
  catalog.cattle.io.clusterrepo.local: ' Um repositório de charts é um repositório Helm ou catálogo de aplicativos baseado em git do {vendor}. Fornece a lista de charts disponíveis no cluster. Os Templates de Cluster são implantados via charts Helm.'
  catalog.cattle.io.operation: Uma operação é a lista de operações Helm recentes que foram aplicadas ao cluster.
  catalog.cattle.io.app: Um aplicativo instalado é um chart Helm 3 que foi instalado por meio de nossos charts ou pelo Helm CLI.
  logging.banzaicloud.io.clusterflow: Os logs do cluster serão coletados e registrados na Saída de Cluster selecionada.
  logging.banzaicloud.io.clusteroutput: Uma saída de cluster define quais provedores de log podem receber logs e só é eficaz quando implantada no namespace em que o operador de log está.
  logging.banzaicloud.io.flow: Um flow define quais logs coletar e filtrar, bem como qual saída enviar os logs. O flow é um recurso com namespace, o que significa que os logs serão coletados apenas do namespace em que o flow está implantado.
  logging.banzaicloud.io.output: Uma saída define quais provedores de log podem receber logs. A saída precisa estar no mesmo namespace que o flow que a utiliza.
  group.principal: Atribuir funções globais a um grupo só funciona com provedores de autenticação externos que suportam grupos. A autorização local não suporta grupos.
  management.cattle.io.oidcclient: Aqui você pode adicionar aplicativos ao provedor de identidade de single sign-on do Rancher
  auditlog.cattle.io.auditpolicy: Defina regras que determinam quais eventos da API Rancher são registrados e o nível de detalhe que contêm.

