    maxUnavailable:
      label: Máximo Indisponível
      tip: O número máximo de pods que podem ficar indisponíveis a qualquer momento.
    minReadySeconds:
      label: Mínimo Pronto
      tip: The minimum duration a pod should be ready without containers crashing for it to be considered available.
    podManagementPolicy:
      label: Política de Gerenciamento de Pods
    progressDeadlineSeconds:
      label: Prazo de Progresso
      tip: The minimum duration to wait for a deployment to progress before marking it failed.
    revisionHistoryLimit:
      label: Limite do Histórico de Revisões
      tip: O número de ReplicaSets antigos a reter para rollback.
    strategies:
