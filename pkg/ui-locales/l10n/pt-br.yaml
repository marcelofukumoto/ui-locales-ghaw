fleet:
  settings:
    label: Entrega Contínua
    title: Configurações de Entrega Contínua
    info: O Rancher reiniciará o agente Fleet e o controlador ao alterar as configurações.
    apply: Aplicar alterações
    noPermissions: Você não tem permissões para modificar as Configurações do Fleet
    parseError: 'Não é possível analisar valores de "{ path }" em "{ id }" ConfigMap'
