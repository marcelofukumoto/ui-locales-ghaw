advancedSettings:
  setEnv: Definido por Variável de Ambiente
  hideShow: Ocultar/mostrar configuração
  label: Configurações
  subtext: Usuários comuns não precisarão alterar essas configurações. Prossiga com cautela — valores incorretos podem quebrar sua instalação do {appName}. As configurações que foram personalizadas a partir dos valores padrão são marcadas como 'Modificado'.
  show: Mostrar
  hide: Ocultar
  none: Nenhum
  modified: Modificado
  edit:
    moreActions: Mais ações para a configuração - { setting }
    label: Editar Configuração
    changeSetting: "Alterar Configuração:"
    agentConfigBanner: 
      text: Editar este valor não alterará o valor definido nos clusters em execução! Para atualizar um cluster em execução com os novos valores, edite o cluster e clique em "Aplicar configurações globais para Priority Class e Pod Disruption Budget" na aba de configuração do agente {agent}.
      cluster: Cluster
      fleet: Fleet
    trueOption: "Verdadeiro"
    falseOption: "Falso"
    value: Valor
    useDefault: Usar o valor padrão
    invalidJSON: JSON inválido - verifique e corrija sua entrada antes de salvar
  descriptions:
    'cacerts': "Certificados CA necessários para verificar o certificado do servidor."
    'password-min-length': 'Defina o número mínimo de caracteres exigidos para uma senha de usuário.'
    'cluster-defaults': 'Substituir padrões do RKE ao criar novos clusters.'
    'engine-install-url': 'URL padrão de instalação do Docker engine (para a maioria dos drivers de node).'
    'engine-iso-url': 'URL padrão de instalação do SO (para o driver vSphere).'
    'engine-newest-version': 'A versão mais recente suportada do Docker no momento deste lançamento. Uma versão do Docker que não satisfaça o intervalo suportado, mas seja mais recente que esta, será marcada como não testada.'
    'engine-supported-range': 'Intervalo semver para versões suportadas do Docker engine. Versões que não satisfaçam este intervalo serão marcadas como não suportadas na interface.'
    'ingress-ip-domain': 'Domínio DNS curinga para uso em hostnames de Ingress gerados automaticamente. <ingress-name>.<namespace-name>.<endereço IP do controlador de ingress> será adicionado ao domínio.'
    'server-url': 'URL padrão de instalação do {appName}. Deve ser HTTPS. Todos os nodes do seu cluster devem conseguir acessá-la.'
    'system-default-registry': 'Registro privado a ser usado para todas as imagens de contêiner do sistema Rancher. Se nenhum valor for especificado, o registro padrão para o runtime de contêiner é usado. Para Docker e containerd, o padrão é `docker.io`.'
    'ui-index': 'Localização do índice HTML para a interface do Cluster Manager.'
    'ui-dashboard-index': 'Localização do índice HTML para a interface do {appName}.'
    'ui-offline-preferred': 'Controla se os recursos da interface são servidos localmente pelo contêiner do servidor ou a partir da URL remota definida nas configurações ui-index e ui-dashboard-index. A opção `Dinâmico` usará recursos locais em builds de produção do {appName}.'
    'ui-pl': 'Nome da empresa de Private Label.'
    'auth-user-info-max-age-seconds': 'A idade máxima dos tokens de autenticação de um usuário antes que uma sincronização de membros de grupo do provedor de autenticação seja realizada.'
    'auth-user-info-resync-cron': 'Agendamento cron padrão para ressincronização de membros de grupo do provedor de autenticação.'
    'cluster-template-enforcement': 'Não-administradores serão restritos a lançar clusters somente via Templates RKE pré-aprovados.'
    'auth-user-session-idle-ttl-minutes': 'TTL de inatividade personalizado (em minutos) em uma sessão de autenticação de usuário. Esta é a duração máxima que uma sessão pode permanecer ativa quando não há atividade do usuário no navegador. Deve ser menor que "auth-user-session-ttl-minutes". Se "auth-user-session-idle-ttl-minutes" for maior ou igual a "auth-user-session-ttl-minutes", o recurso de inatividade de sessão é considerado desativado.'
    'auth-user-session-ttl-minutes': 'TTL personalizado (em minutos) em uma sessão de autenticação de usuário. Esta é a duração máxima que uma sessão pode permanecer ativa independentemente da atividade do usuário no navegador. Deve ser maior que "auth-user-session-idle-ttl-minutes".'
    'auth-token-max-ttl-minutes': 'TTL máximo (em minutos) para todos os tokens, exceto os controlados por "auth-user-session-ttl-minutes" (tokens de sessão de usuário). Quando definido como 0, o token nunca expira.'
    'kubeconfig-generate-token': 'Gerar tokens automaticamente para usuários quando um kubeconfig for solicitado.'
    'kubeconfig-default-token-ttl-minutes': 'TTL (em minutos) aplicado a todos os tokens de kubeconfig. Quando definido como 0, o token nunca expira.'
    'rke-metadata-config': 'Configurar parâmetros de atualização de metadados do RKE.'
    'ui-banners': 'O banner de classificação é usado para exibir um banner fixo personalizado no cabeçalho, rodapé ou ambos.'
    'custom-notifications': Editar notificações personalizadas
    'ui-consent-banner': 'O banner é usado para exibir um banner de consentimento personalizado apresentado aos usuários durante o login.'
    'ui-default-landing': 'A página padrão em que os usuários chegam após o login.'
    'brand': Nome da pasta para um tema alternativo definido em '/assets/brand'
    'hide-local-cluster': Ocultar o cluster local
    'agent-tls-mode': "Verificação de Certificado Rancher. No modo `strict`, os agentes (sistema, cluster, fleet, etc.) somente confiarão em instalações do Rancher que usem um certificado assinado pelo CABundle na configuração `cacerts`. Quando o modo é system-store, os agentes confiarão em qualquer certificado assinado por um CABundle no repositório de confiança do sistema operacional."
    'k3s-based-upgrader-uninstall-concurrency': Define o número máximo de clusters nos quais o Rancher pode desinstalar simultaneamente o app legado `rancher-k3s-upgrader` ou `rancher-rke2-upgrader` de clusters K3s ou RKE2 importados ou gerenciados por driver de node.
    'system-agent-upgrader-install-concurrency': Define o número máximo de clusters nos quais o Rancher pode instalar simultaneamente os recursos necessários para atualizar o system-agent.
    'imported-cluster-version-management': Ativa o gerenciamento de versão para clusters RKE2/K3s importados e para o cluster local, se ele for um cluster RKE2/K3s. A configuração de gerenciamento de versão por cluster substitui esta configuração global no nível do cluster. Para clusters existentes onde o gerenciamento de versão no nível do cluster está definido como 'system-default', alterar este flag acionará uma reimplantação do agente do cluster durante a próxima reconciliação (por padrão a cada 5 minutos, ou assim que o cluster for editado, o que ocorrer primeiro).
  warnings:
    'agent-tls-mode': 'Alterar esta configuração fará com que todos os agentes sejam reimplantados.'
  editHelp:
    'ui-banners': Esta configuração recebe um objeto JSON contendo 3 parâmetros raiz; <code>banner</code>, <code>showHeader</code>, <code>showFooter</code>. <code>banner</code> é um objeto contendo; <code>textColor</code>, <code>background</code> e <code>text</code>, onde <code>textColor</code> e <code>background</code> são qualquer valor de cor CSS válido.
  enum:
    'ui-default-landing':
      ember: Gerenciador de Cluster
      vue: Explorador de Cluster
    'ui-offline-preferred':
      dynamic: Dinâmico
      true: Local
      false: Remoto
    'harv-ui-source':
      auto: 'Automático'
      bundled: 'Integrado'
      external: 'Externo'
    'harv-log-level':
      info: Informação
      debug: Depuração
      trace: Rastreamento
    'agent-tls-mode':
      strict: 'Estrito'
      system-store: 'Repositório do Sistema'
  provisioning:
    header: Provisionamento de Cluster

