    title: Waiting for Restart
    wait: This may take a few moments

performance:
  label: Configurações de Desempenho da UI
  settingName: Desempenho
  deprecatedInactivitySetting: A configuração <i class="mr-5">"Inatividade"</i> agora está obsoleta em favor da configuração <i class="mr-5">"Expiração de Sessão por Inatividade"</i>.
  deprecatedForSSP: A configuração <i class="mr-5">"{setting}"</i> agora está obsoleta e será removida em uma versão futura.
  incrementalLoad:
    label: Carregamento Incremental
    setting: Você pode configurar o limite acima do qual o carregamento incremental será usado.
    description: |-
      When enabled, resources will appear more quickly, but it may take slightly longer to load the entire set of resources. This setting only applies to resources that come from the Kubernetes API
    checkboxLabel: Habilitar carregamento incremental
    inputLabel: Limite de Recursos
    incompatibleDescription: "O Carregamento Incremental é incompatível com filtragem por Namespace/Projeto e Paginação no Servidor."
  manualRefresh:
    label: Atualização Manual
    setting: Você pode configurar um limite acima do qual a atualização manual será habilitada.
    buttonTooltip: Atualizar lista
    description: |-
      When enabled, list data will not auto-update but instead the user must manually trigger a list-view refresh. This setting only applies to resources that come from the Kubernetes API
    checkboxLabel: Habilitar atualização manual de dados para listas
    inputLabel: Limite de Recursos
    incompatibleDescription: "A Atualização Manual é incompatível com filtragem por Namespace/Projeto e Paginação no Servidor."
  websocketNotification:
    label: Notificações via Websocket
    description: |-
      When checked, websocket notifications will not appear when the UI detects a disconnection.
    checkboxLabel: Desabilitar notificações via websocket
  gc:
    label: Coleta de Lixo de Recursos
    description: A UI armazenará recursos Kubernetes localmente em cache para evitar ter que buscá-los novamente. Em alguns casos, isso pode levar ao consumo excessivo de memória.
    checkboxLabel: Habilitar Coleta de Lixo
    whenRun:
      description: Atualizar quando a coleta de lixo é executada
      intervalCheckBox:
        label: Executar coleta de lixo periodicamente
      interval:
        inputLabel: Executar a cada
      route:
        description: Executar coleta de lixo na mudança de página
        inputLabel: Mudança de Página
    howRun:
      description: Atualizar como a coleta de lixo é executada
      age:
        description: "Os tipos de recurso não devem ter sido acessados dentro deste período para serem considerados para coleta de lixo."
        inputLabel: Idade do Recurso
      count:
        description: Os tipos de recurso devem exceder esta quantidade para serem considerados para coleta de lixo.
        inputLabel: Contagem de Recursos
  nsFiltering:
    label: Exigir Filtragem por Namespace / Projeto
    description: Exigir que o usuário selecione namespaces e/ou projetos. Isso restringe o número de recursos buscados da API.
    checkboxLabel: Habilitar Filtragem Obrigatória por Namespace / Projeto
    incompatibleDescription: "A Filtragem Obrigatória por Namespace / Projeto é incompatível com Atualização Manual e Carregamento Incremental."
  advancedWorker:
    label: Web Worker Websocket
    description: Atualizações de recursos enviadas à UI chegam via WebSocket e são tratadas na thread da UI. Um Web Worker pode ser usado para mover esse processamento para um thread separado.
    checkboxLabel: Habilitar Web Worker Websocket Avançado
  inactivity:
    title: Inatividade
    checkboxLabel: Habilitar expiração de sessão por inatividade
    inputLabel: Timeout de inatividade (minutos)
    information: Para alterar o comportamento de logout automático, edite os tempos de expiração do token de autorização e/ou sessão.
    description: Quando habilitado e o usuário ficar inativo além do timeout especificado, a UI não atualizará mais os dados automaticamente.
    authUserTTL: Este timeout não pode ser maior que o timeout de sessão do usuário auth-user-session-ttl-minutes.
  serverPagination:
    label: Paginação no Servidor
