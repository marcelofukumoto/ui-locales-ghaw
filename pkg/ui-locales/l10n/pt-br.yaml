    'cacerts': "Certificados CA necessários para verificar o certificado do servidor."
    'password-min-length': 'Define o número mínimo de caracteres exigidos para uma senha de usuário.'
    'cluster-defaults': 'Substitui os Padrões RKE ao criar novos clusters.'
    'engine-install-url': 'URL de instalação padrão do motor Docker (para a maioria dos drivers de nó).'
    'engine-iso-url': 'URL de instalação padrão do SO (para o driver vSphere).'
    'engine-newest-version': 'A versão mais nova do Docker suportada no momento deste lançamento. Uma versão do Docker que não satisfaz o intervalo suportado será considerada muito nova para ser executada em nós.'
    'engine-supported-range': 'Intervalo Semver para versões de motor Docker suportadas. Versões que não satisfaçam este intervalo serão consideradas muito antigas para serem executadas em nós.'
    'ingress-ip-domain': 'Domínio DNS curinga para usar em hostnames de Ingress gerados automaticamente. <ingress-name>.<namespace>.<domínio-aqui> será o hostname gerado.'
    'server-url': 'URL de instalação padrão do {appName}. Deve ser HTTPS. Todos os nós em seu cluster devem conseguir alcançar este endereço.'
    'system-default-registry': 'Registro privado a ser usado para todas as Imagens de Contêiner do Sistema Rancher. Se nenhum valor for especificado, o registro Docker público será usado por padrão.'
    'ui-index': 'Localização do índice HTML para a UI do Gerenciador de Cluster.'
    'ui-dashboard-index': 'Localização do índice HTML para a UI do {appName}.'
    'ui-offline-preferred': 'Controla se os recursos da UI são servidos localmente pelo contêiner do servidor ou a partir da URL remota definida em ui-index.'
    'ui-pl': 'Nome da empresa Private-Label.'
    'auth-user-info-max-age-seconds': 'A idade máxima dos tokens de autenticação de um usuário antes que uma sincronização de membros de grupo do provedor de autenticação seja realizada.'
    'auth-user-info-resync-cron': 'Agendamento cron padrão para ressincronizar memberships de grupos do provedor de autenticação.'
    'cluster-template-enforcement': 'Não-administradores serão restritos a lançar clusters apenas via Templates RKE pré-aprovados.'
    'auth-user-session-idle-ttl-minutes': 'TTL de inatividade personalizado (em minutos) em uma sessão de autenticação de usuário. Esta é a duração máxima que uma sessão pode permanecer inativa.'
    'auth-user-session-ttl-minutes': 'TTL personalizado (em minutos) em uma sessão de autenticação de usuário. Esta é a duração máxima que uma sessão pode permanecer ativa.'
    'auth-token-max-ttl-minutes': 'TTL máximo (em minutos) para todos os tokens exceto aqueles controlados por "auth-user-session-ttl-minutes" (token de usuário). Defina como 0 para sem expiração.'
    'kubeconfig-generate-token': 'Gerar automaticamente tokens para usuários quando um kubeconfig é solicitado.'
    'kubeconfig-default-token-ttl-minutes': 'TTL (em minutos) aplicado em todos os tokens kubeconfig. Quando definido como 0, o token nunca expira.'
    'rke-metadata-config': 'Configurar parâmetros de atualização de metadados do RKE.'
    'ui-banners': 'O banner de classificação é usado para exibir um banner fixo personalizado no cabeçalho, rodapé ou ambos.'
    'custom-notifications': Editar notificações personalizadas
    'ui-consent-banner': 'O banner é usado para exibir um banner de consentimento personalizado apresentado aos usuários durante o login.'
    'ui-default-landing': 'A página padrão para onde os usuários são direcionados após o login.'
    'brand': Nome da pasta para um tema alternativo definido em '/assets/brand'
    'hide-local-cluster': Ocultar o cluster local
    'agent-tls-mode': "Verificação de Certificado Rancher. No modo `strict`, os agentes (sistema, cluster, fleet, etc) só aceitarão certificados emitidos por CAs presentes no bundle de CAs do Rancher."
    'k3s-based-upgrader-uninstall-concurrency': Define o número máximo de clusters em que o Rancher pode desinstalar concorrentemente o atualizador legado `rancher-system-agent`.
    'system-agent-upgrader-install-concurrency': Define o número máximo de clusters em que o Rancher pode instalar concorrentemente os recursos necessários para o gerenciamento de versão.
    'imported-cluster-version-management': Habilita o gerenciamento de versão para clusters RKE2/K3s importados, e o cluster local se for RKE2/K3s.
