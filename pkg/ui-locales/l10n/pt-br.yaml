  hide: Ocultar
  none: Nenhum
  modified: Modificado
  edit:
    moreActions: Mais ações para configuração - { setting }
    label: Editar Configuração
    changeSetting: "Alterar Configuração:"
    agentConfigBanner: 
      text: Editar este valor não alterará o valor definido nos clusters em execução! Para atualizar um cluster em execução, edite a configuração na seção de edição do cluster.
      cluster: Cluster
      fleet: Fleet
    trueOption: "Verdadeiro"
    falseOption: "Falso"
