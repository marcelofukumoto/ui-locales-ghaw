performance:
  label: Configurações de Desempenho da Interface
  settingName: Desempenho
  deprecatedInactivitySetting: A configuração <i class="mr-5">"Inatividade"</i> foi descontinuada em favor de <i class="mr-5">auth-user-session-idle-ttl-minutes</i>&nbsp;<a href="{settingsPageUrl}">Configuração</a>.
  deprecatedForSSP: A configuração <i class="mr-5">"{setting}"</i> foi descontinuada e será removida em uma versão futura.
  incrementalLoad:
    label: Carregamento Incremental
    setting: Você pode configurar o limite acima do qual o carregamento incremental será usado.
    description: |-
      Quando ativado, os recursos aparecerão mais rapidamente, mas pode levar um pouco mais de tempo para carregar o conjunto completo de recursos. Esta configuração se aplica apenas a recursos provenientes da API do Kubernetes
    checkboxLabel: Ativar carregamento incremental
    inputLabel: Limite de Recursos
    incompatibleDescription: "O Carregamento Incremental é incompatível com a filtragem de Namespace/Projeto e Paginação no Servidor. Ativá-lo desativará essas opções."
  manualRefresh:
    label: Atualização Manual
    setting: Você pode configurar um limite acima do qual a atualização manual será ativada.
    buttonTooltip: Atualizar lista
    description: |-
      Quando ativado, os dados da lista não serão atualizados automaticamente; em vez disso, o usuário deve acionar manualmente uma atualização da visualização de lista. Esta configuração se aplica apenas a recursos provenientes da API do Kubernetes
    checkboxLabel: Ativar atualização manual de dados para listas
    inputLabel: Limite de Recursos
    incompatibleDescription: "A Atualização Manual é incompatível com a filtragem de Namespace/Projeto e Paginação no Servidor. Ativá-la desativará essas opções."
  websocketNotification:
    label: Notificações Websocket
    description: |-
      Quando marcado, as notificações de websocket não aparecerão quando a interface detectar uma desconexão.
    checkboxLabel: Desativar notificações de websocket
  gc:
    label: Coleta de Lixo de Recursos
    description: A interface armazenará recursos Kubernetes localmente para evitar buscá-los novamente. Em alguns casos, isso pode levar a uma grande quantidade de dados armazenados no navegador. Ative esta configuração para removê-los periodicamente.
    checkboxLabel: Ativar Coleta de Lixo
    whenRun:
      description: Atualizar quando a coleta de lixo é executada
      intervalCheckBox:
        label: Executar coleta de lixo periodicamente
      interval:
        inputLabel: Executar a cada
      route:
        description: Executar coleta de lixo ao mudar de página
        inputLabel: Mudança de Página
    howRun:
      description: Atualizar como a coleta de lixo é executada
      age:
        description: "Os tipos de recursos não devem ter sido acessados dentro deste período para serem considerados para coleta de lixo."
        inputLabel: Idade do Recurso
      count:
        description: Os tipos de recursos devem exceder esta quantidade para serem considerados para coleta de lixo.
        inputLabel: Contagem de Recursos
  nsFiltering:
    label: Exigir Filtragem de Namespace / Projeto
    description: Exija que o usuário selecione namespaces e/ou projetos. Isso restringe o número de recursos buscados ao visualizar listas e deve ajudar na responsividade da interface em sistemas com muitos recursos.
    checkboxLabel: Ativar Filtragem Obrigatória de Namespace / Projeto
    incompatibleDescription: "A Filtragem Obrigatória de Namespace / Projeto é incompatível com Atualização Manual e Carregamento Incremental. Ativá-la desativará essas opções."
  advancedWorker:
    label: Web Worker de Websocket
    description: As atualizações de recursos enviadas para a interface chegam via WebSocket e são tratadas na thread da interface. Ative esta opção para lidar com atualizações de WebSocket do cluster em um Web Worker em uma thread separada. Isso deve ajudar na responsividade da interface em sistemas onde os recursos mudam com frequência.
    checkboxLabel: Ativar Web Worker Avançado de Websocket
  inactivity:
    title: Inatividade
    checkboxLabel: Ativar expiração de sessão por inatividade
    inputLabel: Tempo limite de inatividade (minutos)
    information: Para alterar o comportamento de logout automático, edite os valores de tempo limite de autorização e/ou token de sessão (<code>auth-user-session-ttl-minutes</code> e <code>auth-token-max-ttl-minutes</code>) na página de Configurações.
    description: Quando ativado e o usuário ficar inativo além do tempo limite especificado, a interface não atualizará mais o conteúdo da página e o usuário deverá recarregar a página para continuar.
    authUserTTL: Este tempo limite não pode ser maior que o tempo limite de sessão do usuário auth-user-session-ttl-minutes, que atualmente é de {current} minutos.
  serverPagination:
    label: Paginação no Servidor
    description: Por padrão, as listas buscarão todos os recursos e paginarão (criarão a página com base nas configurações de ordenação e filtro) localmente no navegador. A Paginação no Servidor move isso do navegador para o servidor. Isso melhora o desempenho da interface, especialmente em sistemas com muitos recursos.
    applicable: "A paginação no servidor se aplica aos Tipos de Recursos"
    featureFlag: Ativar/Desativar <i class="mr-5">"Paginação no Servidor"</i> agora é feito exclusivamente via <i class="mr-5">ui-sql-cache</i>&nbsp;<a href="{ffUrl}">Feature Flag</a>
