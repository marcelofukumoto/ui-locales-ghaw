  typeDescriptions:
    apps.daemonset: Os DaemonSets executam exatamente um pod em cada nó elegível. Quando novos nós são adicionados ao cluster, os DaemonSets são implantados automaticamente neles. Recomendado para workloads em todo o sistema ou verticalmente escaláveis que nunca precisam de mais de um pod por nó.
    apps.deployment: Os Deployments executam um número escalável de réplicas de um pod distribuídas entre os nós elegíveis. As alterações são implementadas incrementalmente e podem ser revertidas para a revisão anterior quando necessário. Recomendado para workloads sem estado e horizontalmente escaláveis.
    apps.statefulset: Os StatefulSets gerenciam aplicações com estado e fornecem garantias sobre a ordem e unicidade dos pods criados. Recomendado para workloads com armazenamento persistente ou requisitos rigorosos de identidade, quórum ou ordem de atualização.
    batch.cronjob: Os CronJobs criam Jobs, que então executam Pods, em um agendamento repetitivo. O agendamento é expresso no formato cron Unix padrão e usa o fuso horário do plano de controle do Kubernetes (geralmente UTC).
    batch.job: Os Jobs criam um ou mais pods para executar de forma confiável uma tarefa única, executando um pod até que ele seja encerrado com sucesso. Os pods com falha são automaticamente substituídos até que o número especificado de execuções concluídas seja atingido. Os Jobs também podem executar vários pods em paralelo ou funcionar como uma fila de trabalho em lote.
    pod: Os Pods são as menores unidades de computação implantáveis que você pode criar e gerenciar no Kubernetes. Um Pod é um grupo de um ou mais contêineres, com recursos de armazenamento e rede compartilhados, e uma especificação de como executar os contêineres.
  upgrading:
    activeDeadlineSeconds:
      label: Prazo de Atividade do Pod
      tip: A duração em que o pod pode estar ativo antes que o sistema tente marcá-lo como falho e encerrar os contêineres associados.
    concurrencyPolicy:
      label: Concorrência
      options:
        allow: Permitir que CronJobs sejam executados simultaneamente
        forbid: Ignorar próxima execução se a execução atual não tiver terminado
        replace: Substituir a execução se a execução atual não tiver terminado
    maxSurge:
      label: Máximo de Excesso
      tip: O número máximo de pods permitidos além da escala desejada em um determinado momento.
    maxUnavailable:
      label: Máximo Indisponível
      tip: O número máximo de pods que podem estar indisponíveis em um determinado momento.
    minReadySeconds:
      label: Mínimo de Tempo Pronto
      tip: A duração mínima que um pod deve estar pronto sem que os contêineres falhem para ser considerado disponível.
    podManagementPolicy:
      label: Política de Gerenciamento de Pod
    progressDeadlineSeconds:
      label: Prazo de Progresso
      tip: A duração mínima de espera para que um deployment progrida antes de marcá-lo como falho.
    revisionHistoryLimit:
      label: Limite de Histórico de Revisões
      tip: O número de ReplicaSets antigos a reter para reversão.
    strategies:
      labels:
        delete: "Ao Excluir: Novos pods são criados somente quando os pods antigos são excluídos manualmente."
        recreate: "Recriar: Encerrar TODOS os pods, depois iniciar novos pods."
        rollingUpdate: "Atualização Progressiva: Criar novos pods, até atingir o máximo de excesso, antes de excluir os pods antigos. Não parar mais pods do que o máximo indisponível."
    terminationGracePeriodSeconds:
      label: Período de Carência de Encerramento
      tip: A duração que o pod precisa para encerrar com sucesso.
    title: Atualizando
  tabs:
    labels:
      deployment: Deployment
      pod: Pod
      containers: Contêineres

