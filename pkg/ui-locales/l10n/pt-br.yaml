        delete: 'Ao Deletar: Novos pods só são criados quando pods antigos são deletados manualmente.'
        recreate: 'Recriar: Matar TODOS os pods, depois iniciar novos pods.'
        rollingUpdate: "Rolling Update: Create new pods, until max surge is reached, before deleting old pods. Don't stop more pods than max unavailable."
