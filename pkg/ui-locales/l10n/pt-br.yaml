    Os feature flags permitem que o {vendor} controle determinados recursos por meio de flags.
    Os recursos desativados por padrão devem ser considerados funcionalidades experimentais.
    Alguns recursos exigem uma reinicialização do servidor {vendor} para serem alterados.
    Isso resultará em uma breve indisponibilidade da API e da interface, mas não afetará os clusters ou workloads em execução.
  promptActivate: Confirme que deseja ativar o feature flag "{flag}"
  promptDeactivate: Confirme que deseja desativar o feature flag "{flag}"
