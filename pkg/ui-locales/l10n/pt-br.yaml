      label: Modo TLS
      description: "Determina se o agente deve confiar nos pacotes de CA do repositório de confiança do sistema operacional ao conectar-se a um cluster de gerenciamento."
      options:
        system-store:
          label: armazenamento-do-sistema
        strict:
          label: estrito
    agentCheckinInterval:
      label: Intervalo de Checkin
      description: Uma string de duração para indicar com que frequência os agentes devem reportar um heartbeat.
    garbageCollectionInterval:
      label: Intervalo de Coleta de Lixo
      description: O tempo que os agentes aguardarão antes de limpar antigas versões do Helm.
    clusterEnqueueDelay:
      label: Atraso de Enfileiramento do Cluster
      description: "Intervalo para sincronizar um repositório com os estados de implantação de bundles."
    proxy:
      label: Proxy
      description: Servidor proxy http[s] do Fleet.
      placeholder: http://<username>@<password>:<url>:<port>
    noProxy:
      label: Sem Proxy
      description: Lista separada por vírgulas de domínios ou endereços IP que não usarão o proxy.
