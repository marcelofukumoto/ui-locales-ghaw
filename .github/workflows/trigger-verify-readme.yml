name: Trigger verify-readme on documentation PRs

on:
  workflow_run:
    workflows: ["Update README with Workflow Documentation"]
    types: [completed]

jobs:
  trigger:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Find and comment on documentation PR
        env:
          GH_TOKEN: ${{ secrets.MAINTAINER_PAT }}
        run: |
          # Find the most recent open PR with the 'documentation' label
          PR_NUMBER=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --label documentation \
            --json number,createdAt \
            --jq 'sort_by(.createdAt) | last | .number')

          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "No open documentation PR found, skipping."
            exit 0
          fi

          echo "Found documentation PR #$PR_NUMBER, posting /verify-readme"
          gh pr comment "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --body "/verify-readme"
