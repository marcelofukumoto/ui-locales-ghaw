name: Apply pr-fix patch to fork PRs

on:
  workflow_run:
    workflows: ["PR Fix"]
    types: [completed]

jobs:
  apply-patch:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check for patches in repo-memory and apply
        env:
          GH_TOKEN: ${{ secrets.MAINTAINER_PAT }}
        run: |
          REPO="${{ github.repository }}"

          # Clone the repo-memory branch to look for patch files
          git clone --depth 1 --branch memory/default \
            "https://x-access-token:${GH_TOKEN}@github.com/$REPO.git" \
            /tmp/repo-memory 2>/dev/null || {
            echo "No memory/default branch found, skipping."
            exit 0
          }

          # Find patch files
          PATCH_DIR="/tmp/repo-memory/memory/default/patches"
          if [ ! -d "$PATCH_DIR" ] || [ -z "$(ls -A "$PATCH_DIR"/*.patch 2>/dev/null)" ]; then
            echo "No patch files found in repo-memory, skipping."
            echo "This likely means pr-fix pushed directly (same-repo PR)."
            exit 0
          fi

          # Process each patch file (named pr-<number>.patch)
          for PATCH_FILE in "$PATCH_DIR"/*.patch; do
            FILENAME=$(basename "$PATCH_FILE")
            PR_NUMBER=$(echo "$FILENAME" | sed 's/pr-\([0-9]*\)\.patch/\1/')

            echo "Found patch for PR #$PR_NUMBER: $FILENAME"

            # Verify patch file is not empty
            if [ ! -s "$PATCH_FILE" ]; then
              echo "Patch file is empty, skipping."
              continue
            fi

            PATCH_SIZE=$(wc -c < "$PATCH_FILE")
            echo "Patch size: $PATCH_SIZE bytes"

            # Get PR details
            PR_DATA=$(gh pr view "$PR_NUMBER" --repo "$REPO" \
              --json headRefName,headRepository,headRepositoryOwner,maintainerCanModify,state 2>/dev/null) || {
              echo "PR #$PR_NUMBER not found or not accessible, skipping."
              continue
            }

            PR_STATE=$(echo "$PR_DATA" | jq -r '.state')
            if [ "$PR_STATE" != "OPEN" ]; then
              echo "PR #$PR_NUMBER is $PR_STATE, cleaning up patch and skipping."
              rm "$PATCH_FILE"
              continue
            fi

            HEAD_REF=$(echo "$PR_DATA" | jq -r '.headRefName')
            HEAD_OWNER=$(echo "$PR_DATA" | jq -r '.headRepositoryOwner.login')
            HEAD_REPO_NAME=$(echo "$PR_DATA" | jq -r '.headRepository.name')
            CAN_MODIFY=$(echo "$PR_DATA" | jq -r '.maintainerCanModify')

            REPO_OWNER=$(echo "$REPO" | cut -d'/' -f1)

            # Check if this is a fork PR
            if [ "$HEAD_OWNER" = "$REPO_OWNER" ]; then
              echo "PR #$PR_NUMBER is from the same repo. Agent should have pushed directly."
              echo "Cleaning up patch."
              rm "$PATCH_FILE"
              continue
            fi

            echo "PR #$PR_NUMBER is from fork $HEAD_OWNER/$HEAD_REPO_NAME, branch $HEAD_REF"
            echo "Maintainer can modify: $CAN_MODIFY"

            if [ "$CAN_MODIFY" != "true" ]; then
              echo "Maintainer edits not allowed on this PR. Cannot push to fork."
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ **Auto-apply failed**: This PR does not allow maintainer edits, so the patch cannot be pushed automatically. You can retrieve the patch from the \`memory/default\` branch at \`memory/default/patches/$FILENAME\` and apply it with \`git apply\`."
              continue
            fi

            # Clone the fork, apply the patch, and push
            FORK_DIR="/tmp/fork-$PR_NUMBER"
            FORK_URL="https://x-access-token:${GH_TOKEN}@github.com/$HEAD_OWNER/$HEAD_REPO_NAME.git"
            git clone --depth 1 --branch "$HEAD_REF" "$FORK_URL" "$FORK_DIR" || {
              echo "Failed to clone fork, skipping."
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ **Auto-apply failed**: Could not clone the fork branch. You can retrieve the patch from the \`memory/default\` branch at \`memory/default/patches/$FILENAME\` and apply it with \`git apply\`."
              continue
            }

            cd "$FORK_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            if git apply "$PATCH_FILE"; then
              echo "Patch applied successfully"
              git add -A
              git commit -m "fix: apply pr-fix patch

          Co-authored-by: github-actions[bot] <github-actions[bot]@users.noreply.github.com>"

              if git push origin "$HEAD_REF"; then
                echo "Patch pushed successfully to fork branch"
                gh pr comment "$PR_NUMBER" --repo "$REPO" \
                  --body "✅ **Patch applied automatically** — the fix from pr-fix has been pushed to the PR branch."

                # Clean up the patch file from repo-memory
                rm "$PATCH_FILE"
              else
                echo "Push to fork failed"
                gh pr comment "$PR_NUMBER" --repo "$REPO" \
                  --body "⚠️ **Auto-apply failed**: Could not push to the fork branch. You can retrieve the patch from the \`memory/default\` branch at \`memory/default/patches/$FILENAME\` and apply it with \`git apply\`."
              fi
            else
              echo "Patch apply failed (possible conflicts)"
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ **Auto-apply failed**: The patch could not be applied cleanly. You can retrieve the patch from the \`memory/default\` branch at \`memory/default/patches/$FILENAME\` and apply it with \`git apply\`."
            fi

            cd /tmp
          done

          # Push cleanup changes back to repo-memory (remove applied patches)
          cd /tmp/repo-memory
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git add -A && git diff --cached --quiet; then
            echo "No patches to clean up."
          else
            git commit -m "chore: clean up applied pr-fix patches"
            git push origin memory/default
            echo "Cleaned up applied patches from repo-memory."
          fi
